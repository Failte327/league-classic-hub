# Local Postgres for development. Mapped to host port 5433 to avoid clashing
# with any native Postgres already on 5432.
services:
  db:
    image: postgres:18
    container_name: leagueclassic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: leagueclassic
      POSTGRES_PASSWORD: leagueclassic_dev
      POSTGRES_DB: leagueclassic
    ports:
      - "5433:5432"
    volumes:
      # Postgres 18+ images store data in a versioned subdirectory, so the
      # mount goes at /var/lib/postgresql (not /var/lib/postgresql/data).
      - leagueclassic-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leagueclassic"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional lightweight DB UI at http://localhost:8080 (system: PostgreSQL, server: db).
  adminer:
    image: adminer:5
    container_name: leagueclassic-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  leagueclassic-pgdata:
